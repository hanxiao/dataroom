services:
  llama-server:
    # Pin this. `server-cuda` is a MOVING tag while everything else here is pinned (Pi,
    # adapter, GGUF). The MTP/draft flags below are new and have already changed names once;
    # a silent pull can break startup or drafting determinism. Set LLAMA_IMAGE in .env to an
    # immutable digest before relying on this in production:
    #   docker buildx imagetools inspect ghcr.io/ggml-org/llama.cpp:server-cuda  # copy sha256
    #   LLAMA_IMAGE=ghcr.io/ggml-org/llama.cpp@sha256:<digest>
    image: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    container_name: daas-llama
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
      - ./templates:/templates
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    # Qwen3.6-35B-A3B UD-Q3_K_XL + MTP draft on a single L4 24GB.
    # Q3_K_XL weights ~17GB. This is a HYBRID GDN+MoE model: only 10 of 40 layers carry a
    # per-token KV cache (the other 30 keep a small fixed recurrent state), so per-token KV is
    # tiny -- ~ctx*10.24KB at q8_0, i.e. ~1.3GB at the full 131072 window, not the multi-GB a
    # dense 35B would need. Real headroom is dominated by the GDN recurrent-state pool, compute
    # buffers, and the v5-nano embedder. Measure with nvidia-smi; lower CTX_SIZE if it OOMs.
    command: >
      --model /models/Qwen3.6-35B-A3B-UD-Q3_K_XL.gguf
      --host 0.0.0.0
      --port 8080
      --metrics
      --ctx-size ${CTX_SIZE:-131072}
      --parallel 1
      --flash-attn 1
      --cache-type-k q8_0
      --cache-type-v q8_0
      --no-mmap
      --threads 8
      --spec-type draft-mtp
      --spec-draft-n-max 3
      --spec-draft-p-min 0.1
      --n-predict 8192
      --jinja
      --chat-template-file /templates/chat_template.jinja
      -fitt 512
      # --cache-reuse intentionally OFF: this hybrid (Gated DeltaNet) model has documented
      # recurrent-state cache-drift that can silently corrupt digits across the long
      # --continue + auto-compaction loop (llama.cpp#21681), which is fatal for a factual
      # dataroom. Re-enable `--cache-reuse 256` only once the fix is confirmed in the pinned
      # image and verified by the numeric multi-turn smoke test in docs/DEPLOY.md.

  daas:
    build: .
    container_name: daas-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LLAMA_URL=http://llama-server:8080
      - JOBS_DIR=/data/jobs
      - CONTEXT_WINDOW=${CTX_SIZE:-131072}   # match llama-server --ctx-size (dashboard + compaction)
      - EMBED_DEVICE=cuda          # v5-nano on GPU (~0.5GB) for speed; set cpu to avoid VRAM use
      - TOKENIZERS_PARALLELISM=false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./data:/data
    depends_on:
      - llama-server
    restart: unless-stopped
