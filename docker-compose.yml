services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: daas-llama
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
      - ./templates:/templates
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    # Qwen3.6-35B-A3B UD-Q3_K_XL + MTP draft on a single L4 24GB.
    # ctx 16384 / parallel 1 / flash-attn keeps weights(~17GB)+KV(~4GB) under 24GB (no OOM).
    command: >
      --model /models/Qwen3.6-35B-A3B-UD-Q3_K_XL.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 16384
      --parallel 1
      --flash-attn 1
      --no-mmap
      --threads 8
      --spec-type draft-mtp
      --spec-draft-n-max 3
      --spec-draft-p-min 0.1
      --n-predict 8192
      --jinja
      --chat-template-file /templates/chat_template.jinja
      -fitt 512
      --cache-reuse 256

  daas:
    build: .
    container_name: daas-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LLAMA_URL=http://llama-server:8080
      - JOBS_DIR=/data/jobs
      - CUDA_VISIBLE_DEVICES=          # embedder stays on CPU; no VRAM contention
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ./data:/data
    depends_on:
      - llama-server
    restart: unless-stopped
