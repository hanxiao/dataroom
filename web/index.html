<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dataroom: autonomous research dataroom builder</title>
<meta name="description" content="Give a query; an autonomous agent crawls, researches, and assembles a structured, sourced dataroom until it is comprehensive. Self-hosted Qwen3.6, Pi orchestration." />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="canonical" href="https://dataroom.hanxiao.io/" />
<meta name="theme-color" content="#000000" />
<!-- Open Graph -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Dataroom" />
<meta property="og:title" content="Dataroom: autonomous research dataroom builder" />
<meta property="og:description" content="Give a query; an autonomous agent crawls, researches, and assembles a structured, sourced dataroom until it is comprehensive." />
<meta property="og:url" content="https://dataroom.hanxiao.io/" />
<meta property="og:image" content="https://dataroom.hanxiao.io/og.png" />
<meta property="og:image:width" content="1376" />
<meta property="og:image:height" content="768" />
<meta property="og:image:alt" content="Dataroom: autonomous research dataroom builder" />
<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Dataroom: autonomous research dataroom builder" />
<meta name="twitter:description" content="Give a query; an autonomous agent crawls, researches, and assembles a structured, sourced dataroom until it is comprehensive." />
<meta name="twitter:image" content="https://dataroom.hanxiao.io/og.png" />
<style>
  :root{--bg:#fff;--fg:#000;--mut:#666;--line:#000;--soft:#e5e5e5;--fill:#f5f5f5}
  @media (prefers-color-scheme: dark){:root{--bg:#000;--fg:#fff;--mut:#999;--line:#fff;--soft:#222;--fill:#111}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);overflow-x:hidden;
    font-family:"Berkeley Mono",ui-monospace,Menlo,Consolas,monospace;font-size:13px;line-height:1.5}
  .wrap{max-width:820px;margin:0 auto;padding:48px 24px}
  .masthead{display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid var(--line);padding-bottom:12px}
  h1{font-size:15px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin:0}
  p{color:var(--mut)}
  .lede{color:var(--fg)}
  .sub{color:var(--mut);font-size:12px;margin-top:6px}
  textarea{width:100%;min-height:90px;margin-top:28px;background:var(--bg);color:var(--fg);
    border:1px solid var(--line);padding:10px;font:inherit;resize:vertical}
  .btn{margin-top:10px;border:1px solid var(--line);background:var(--fg);color:var(--bg);
    padding:8px 16px;cursor:pointer;font:inherit}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .field{margin-top:18px}
  .lbl{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--mut);margin-bottom:6px}
  .fieldrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .fieldrow .btn{margin-top:0;margin-left:auto}
  .fieldrow input{width:80px;background:var(--bg);color:var(--fg);
    border:1px solid var(--line);padding:7px 8px;font:inherit}
  .unit{color:var(--mut);font-size:12px}
  /* help badge: the hint shows as a native tooltip on hover/focus of the "?" */
  .help{position:relative;display:inline-flex;align-items:center;justify-content:center;
    width:14px;height:14px;border:1px solid var(--mut);border-radius:50%;font-size:9px;line-height:1;
    color:var(--mut);cursor:help;vertical-align:middle;margin-left:2px;text-transform:none;font-weight:400}
  .help:hover,.help:focus{color:var(--fg);border-color:var(--fg);outline:none}
  .help .tip{position:absolute;left:0;top:calc(100% + 8px);width:250px;max-width:78vw;
    background:var(--bg);color:var(--fg);border:1px solid var(--line);padding:8px 10px;
    font-size:11px;line-height:1.5;text-transform:none;letter-spacing:0;font-weight:400;
    text-align:left;z-index:20;visibility:hidden;opacity:0;transition:opacity .1s;
    box-shadow:0 2px 10px rgba(0,0,0,.15)}
  .help:hover .tip,.help:focus .tip{visibility:visible;opacity:1}
  .out{margin-top:16px;color:var(--mut)}
  a{color:inherit}
  /* footer github link */
  .gh{color:var(--mut);display:inline-flex}
  .gh:hover{color:var(--fg)}
  textarea:focus,.fieldrow input:focus,.btn:focus{outline:1px solid var(--fg);outline-offset:1px}
  /* jobs list */
  .jobs-h{display:flex;justify-content:space-between;align-items:baseline;
    margin-top:36px;border-bottom:1px solid var(--line);padding-bottom:8px}
  .jobs-h h2{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin:0}
  .jobs-h .ref{color:var(--mut);font-size:11px}
  .jobs{margin-top:4px}
  .job{display:flex;align-items:center;gap:12px;padding:9px 4px;
    border-bottom:1px solid var(--soft);cursor:pointer}
  .job:hover{background:var(--fill)}
  .dot{display:inline-block;width:7px;height:7px;border:1px solid var(--line);flex:none;
    vertical-align:middle}
  .dot.on{background:var(--fg)}
  .blink{animation:b 1s steps(2) infinite}
  @keyframes b{50%{opacity:.2}}
  .q{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .pg{color:var(--mut);font-size:11px;white-space:nowrap;flex:none}
  .minibar{display:inline-block;width:44px;height:6px;border:1px solid var(--line);
    position:relative;vertical-align:middle}
  .minibar > i{position:absolute;left:0;top:0;bottom:0;background:var(--fg)}
  /* lean icon actions: dim until the row is hovered (turbopuffer-style restraint) */
  .acts{display:flex;gap:1px;flex:none;opacity:.4;transition:opacity .12s}
  .job:hover .acts{opacity:1}
  .icon{width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;
    border:none;background:none;color:var(--fg);cursor:pointer;font:inherit;font-size:14px;
    line-height:1;text-decoration:none;opacity:.75}
  .icon:hover{opacity:1;background:var(--soft)}
  .icon:disabled{opacity:.3;cursor:default;background:none}
  .icon svg{display:block}
  .empty{color:var(--mut);font-size:12px;padding:20px 0}
  /* mobile: stack the jobs row so it never overflows a narrow screen */
  @media(max-width:600px){
    .wrap{padding:32px 16px}
    .job{flex-wrap:wrap;gap:6px 10px}
    .job .q{flex:1 1 100%;order:-1;white-space:normal;overflow-wrap:anywhere}  /* query first line */
    .job .acts{opacity:1;margin-left:auto}
    .hint{min-width:0;overflow-wrap:anywhere}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <h1>Dataroom</h1>
    <a class="gh" href="https://github.com/hanxiao/dataroom" target="_blank" rel="noopener" title="Source on GitHub" aria-label="Source on GitHub">
      <svg viewBox="0 0 16 16" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </header>
  <p class="lede">Give a query. An autonomous harness crawls, researches, and assembles a
     structured dataroom until it is comprehensive.</p>

  <textarea id="q" placeholder="e.g. Competitive landscape of self-hosted small embedding models in 2026"></textarea>

  <div class="field">
    <label class="lbl" for="budget">Time budget <span class="help" tabindex="0" role="button" aria-label="What is the time budget?">?<span class="tip">How long the agent works on this dataroom - like time-boxing an intern. It stops early if it judges the topic exhausted; otherwise it hands over what it has when the time is up. Bigger budget = more thorough.</span></span></label>
    <div class="fieldrow">
      <input type="number" id="budget" value="45" min="1" max="60" step="5">
      <span class="unit">minutes</span>
      <button class="btn" id="go">Start research</button>
    </div>
  </div>
  <div class="out" id="out"></div>

  <div class="jobs-h">
    <h2>Jobs</h2>
    <span class="ref" id="ref">idle</span>
  </div>
  <div class="jobs" id="jobs"><div class="empty">Loading jobs<span class="blink">…</span></div></div>

</div>

<script>
const $=id=>document.getElementById(id);
const go=$("go");

go.onclick=async()=>{
  if(go.disabled)return;
  const query=$("q").value.trim();
  if(query.length<10){$("out").textContent="enter a real research query (a few words at least).";return;}
  go.disabled=true;$("out").textContent="submitting…";
  try{
    let mins=parseInt($("budget").value,10);
    if(!(mins>0))mins=45;
    mins=Math.min(60,Math.max(1,mins));   // 60-min ceiling (backend also clamps)
    const body={query,max_seconds:mins*60};   // time box: agent works up to this long, then hands over
    const r=await fetch("/jobs",{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify(body)});
    if(!r.ok){throw new Error("HTTP "+r.status+" "+(await r.text()).slice(0,200));}
    const d=await r.json();
    if(d.job_id){location.href=`/jobs/${d.job_id}/dashboard`;return;}
    throw new Error(JSON.stringify(d));
  }catch(e){
    $("out").textContent="error: "+(e.message||e);
    go.disabled=false;
  }
};

const esc=s=>String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

// Inline monochrome SVG icons (currentColor, thin strokes - turbopuffer style). Crisp + font-independent.
function ic(n){
  const a='viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"';
  if(n==="download")return `<svg ${a}><path d="M8 2.5v7"/><path d="M5 6.8l3 3 3-3"/><path d="M3.5 12.5h9"/></svg>`;
  if(n==="pause")return `<svg ${a}><path d="M6 3.5v9"/><path d="M10 3.5v9"/></svg>`;
  if(n==="resume")return `<svg viewBox="0 0 16 16" width="15" height="15" fill="currentColor"><path d="M5 3.4l7.2 4.6L5 12.6z"/></svg>`;
  return "";
}

// pause/resume a job, then refresh the list so the button state flips on confirmed status.
async function jpost(id,act){try{await fetch(`/jobs/${id}/${act}`,{method:"POST"});}catch(e){}loadJobs();}
function controlsFor(j){
  const s=j.status, id=j.job_id; let h="";
  if(s==="paused")h+=`<button class="icon" title="resume" onclick="event.stopPropagation();jpost('${id}','resume')">${ic("resume")}</button>`;
  else if(s==="running"||s==="queued")h+=`<button class="icon" title="pause" onclick="event.stopPropagation();jpost('${id}','pause')">${ic("pause")}</button>`;
  else if(s==="pausing")h+=`<button class="icon" title="pausing…" disabled>${ic("pause")}</button>`;
  return h;
}

function dotFor(s){
  if(s==="running")return '<span class="dot on blink"></span>';
  if(s==="done"||s==="stopped"||s==="failed"||s==="interrupted")return '<span class="dot on"></span>';
  return '<span class="dot"></span>';
}
function progressText(j){
  // Show the real-time total file count (what the detail page shows), not the substantive-floor
  // count - substantive_files only counts topics/+reports/, so it reads 0 during sourcing even
  // though files exist. The minibar still tracks progress-to-floor separately.
  const fc=j.file_count||0;
  // a running backfill job (auto-resumed from the paused pool to keep the GPU busy) yields to any new query
  if(j.status==="running"&&j.auto)return `${fc} files · backfill`;
  if(["running","done","stopped"].includes(j.status))return `${fc} files`;
  if(j.status==="paused")return `paused · ${fc} files`;   // resumable; show banked work
  if(j.status==="pausing")return `pausing · ${fc} files`; // transient; until the cycle boundary
  return j.status;   // queued / failed
}
function miniBar(j){
  let pct;
  if(j.max_seconds){                       // time-box progress: elapsed / budget
    const elapsed=Math.max(0,(j.finished||Date.now()/1000)-(j.started||Date.now()/1000));
    pct=100*Math.min(1, elapsed/j.max_seconds);
  }else{                                    // fall back to comprehensiveness floor
    const sub=j.substantive_files||0, min=j.min_files||100, pr=j.progress||{};
    pct = pr.total>0 ? 100*pr.done/pr.total : 100*Math.min(1,sub/min);
  }
  return `<span class="minibar"><i style="width:${Math.min(100,pct)}%"></i></span>`;
}

async function loadJobs(){
  try{
    const r=await fetch("/jobs",{cache:"no-store"});
    if(!r.ok)throw 0;
    const d=await r.json();
    const jobs=d.jobs||[];
    if(!jobs.length){$("jobs").innerHTML='<div class="empty">No jobs yet. Submit a query above to start one.</div>';}
    else{
      $("jobs").innerHTML=jobs.map(j=>`
        <div class="job" title="${esc(j.status)}" onclick="location.href='/jobs/${j.job_id}/dashboard'">
          <span class="st">${dotFor(j.status)}</span>
          <span class="q" title="${esc(j.query)}">${esc(j.query)||"(no query)"}</span>
          <span class="pg">${(j.status==="running")?miniBar(j)+" ":""}${esc(progressText(j))}</span>
          <span class="acts" onclick="event.stopPropagation()">
            <a class="icon" href="/jobs/${j.job_id}/snapshot" title="download zip">${ic("download")}</a>
            ${controlsFor(j)}
          </span>
        </div>`).join("");
    }
    $("ref").textContent="updated "+new Date().toLocaleTimeString();
  }catch(e){ $("ref").textContent="reconnecting…"; }
}
loadJobs();setInterval(loadJobs,4000);
</script>
</body>
</html>
